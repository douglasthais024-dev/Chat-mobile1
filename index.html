<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat Mobile Premium Completo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #059669;
            --primary-light: #34d399;
            --primary-glow: rgba(5, 150, 105, 0.4);
            --bg-dark: #090d16;
            --bg-panel: #0f172a;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-active: rgba(255, 255, 255, 0.08);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Container Principal */
        .app-container {
            position: relative;
            width: 100%;
            height: 100dvh;
            max-width: 480px;
            background-color: var(--bg-panel);
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            display: flex;
            overflow: hidden;
            border-radius: 0;
        }

        @media (min-width: 481px) {
            .app-container {
                height: 92vh;
                border-radius: 24px;
                border: 8px solid #334155;
            }
        }

        /* ================= SIDEBAR (Lista de Conversas) ================= */
        .sidebar {
            flex: 100%;
            min-width: 100%;
            background-color: var(--bg-panel);
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--border-glass);
        }

        /* Quando o chat estiver ativo, move a sidebar para fora no mobile */
        .app-container.chat-open .sidebar {
            transform: translateX(-100%);
        }

        /* Cabeçalhos */
        .header {
            height: 65px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid var(--border-glass);
            z-index: 10;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .header-left-side {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        /* Botão de Perfil (Sem Foto) */
        .profile-config-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--glass);
            border: 2px solid var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 12px var(--primary-glow);
            transition: transform 0.2s, background-color 0.2s;
            color: var(--primary-light);
            font-size: 18px;
            flex-shrink: 0;
        }
        .profile-config-btn:active {
            transform: scale(0.95);
            background-color: var(--glass-active);
        }

        .header-icons {
            display: flex;
            gap: 18px;
            color: var(--text-muted);
            font-size: 18px;
            align-items: center;
            flex-shrink: 0;
        }

        .header-icons i {
            cursor: pointer;
            transition: color 0.2s;
        }

        .header-icons i:hover {
            color: var(--primary-light);
        }

        /* Botão voltar no Mobile */
        .mobile-back-btn {
            font-size: 18px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            margin-right: 4px;
        }

        /* Pesquisa */
        .search-container {
            background-color: rgba(15, 23, 42, 0.4);
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-glass);
        }

        .search-box {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            padding: 8px 14px;
            border-radius: 12px;
            gap: 10px;
        }

        .search-box input {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-size: 14px;
            color: var(--text-main);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        /* Lista de Chats */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            background-color: var(--bg-panel);
        }

        .chat-item {
            display: flex;
            padding: 16px;
            align-items: center;
            cursor: pointer;
            border-bottom: 1px solid var(--border-glass);
            transition: background 0.2s, border-left 0.2s;
            border-left: 0 solid transparent;
        }

        .chat-item:active, .chat-item.active {
            background-color: var(--glass-active);
            border-left: 4px solid var(--primary-light);
        }

        .chat-info {
            flex: 1;
            overflow: hidden;
        }

        .chat-info-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-info-top h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 240px;
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
            margin-left: 8px;
        }

        .chat-msg-preview {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ================= ÁREA DE CONVERSA (CHAT) ================= */
        .chat-area {
            flex: 100%;
            min-width: 100%;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            z-index: 10;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Quando o chat estiver ativo, joga ele para dentro da tela */
        .app-container.chat-open .chat-area {
            right: 0;
        }

        /* Janela de Mensagens com Papéis de Parede Dinâmicos */
        .chat-window {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-overflow-scrolling: touch;
        }

        /* Opções de Papel de Parede */
        .wp-classic {
            background-color: #0f172a;
            background-image: radial-gradient(circle at top, #131b2e, #070a12);
        }

        .wp-dark {
            background-color: #020617;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .wp-sunset {
            background: linear-gradient(135deg, #1e1b4b 0%, #451a03 100%);
        }

        .wp-forest {
            background: linear-gradient(135deg, #022c22 0%, #064e3b 100%);
        }

        .wp-neon {
            background: radial-gradient(circle at center, #1e1b4b, #020617);
        }

        /* Balões de Mensagem */
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.92rem;
            position: relative;
            line-height: 1.4;
            word-wrap: break-word;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            animation: bounceIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        @keyframes bounceIn {
            from { opacity: 0; transform: translateY(16px) scale(0.92); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message .time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            text-align: right;
            margin-top: 5px;
            align-self: flex-end;
        }

        .msg-received {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #f1f5f9;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-sent {
            background: linear-gradient(135deg, var(--primary), #047857);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-sent .time {
            color: rgba(255, 255, 255, 0.65);
        }

        /* Rodapé de Envio */
        .chat-footer {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 12px 14px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            border-top: 1px solid var(--border-glass);
            position: relative;
        }

        .footer-icons {
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            gap: 12px;
            padding-bottom: 8px;
        }

        .footer-icons i:hover {
            color: var(--primary-light);
        }

        .input-wrapper {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 4px 14px;
            display: flex;
            align-items: flex-end;
            min-height: 44px;
            max-height: 140px;
            transition: all 0.2s ease;
        }
        .input-wrapper:focus-within {
            border-color: rgba(52, 211, 153, 0.3);
            background: rgba(255, 255, 255, 0.07);
        }

        .chat-input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 0.95rem;
            color: white;
            resize: none;
            padding: 10px 0;
            line-height: 1.4;
        }
        .chat-input::placeholder { color: var(--text-muted); }

        /* Botão de Envio / Mic */
        .btn-send {
            background-color: var(--primary);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 12px var(--primary-glow);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        .btn-send:active { transform: scale(0.9); }

        /* Container de Gravação */
        .recording-container {
            display: none;
            align-items: center;
            gap: 10px;
            flex: 1;
            height: 40px;
            color: #f87171;
            font-size: 0.9rem;
            padding-left: 6px;
            font-weight: 600;
        }

        .record-dot {
            width: 10px;
            height: 10px;
            background: #f87171;
            border-radius: 50%;
            animation: pulseRecord 0.8s infinite alternate;
        }
        @keyframes pulseRecord { from { opacity: 0.3; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

        /* Painel de Emojis */
        .emoji-panel {
            position: absolute;
            bottom: 75px;
            left: 12px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 18px;
            padding: 12px;
            display: none;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            box-shadow: 0 -12px 36px rgba(0,0,0,0.6);
            z-index: 100;
            max-width: 260px;
        }

        .emoji-panel.show {
            display: grid;
        }

        .emoji-item {
            font-size: 22px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.1s;
            user-select: none;
        }

        .emoji-item:active {
            transform: scale(1.3);
        }

        /* Painel de Papéis de Parede (Wallpapers) */
        .wallpaper-panel {
            position: absolute;
            top: 65px;
            right: 16px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 101;
            width: 160px;
        }

        .wallpaper-panel.show {
            display: flex;
        }

        .wp-option {
            padding: 6px 10px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            color: var(--text-main);
        }

        .wp-option:hover {
            background-color: var(--glass-active);
        }

        .wp-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid var(--border-glass);
        }

        /* ================= MODAL CONFIGURAÇÃO IDENTIDADE ================= */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(9, 13, 22, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .identity-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 24px;
            width: 85%;
            max-width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .identity-card {
            transform: scale(1);
        }

        .identity-card h3 {
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .identity-card p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-group input {
            padding: 12px 14px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            color: white;
            transition: border 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary-light);
        }

        .btn-action {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 14px var(--primary-glow);
            transition: background 0.2s;
        }

        .btn-action:active {
            background-color: #047857;
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        
        <!-- SIDEBAR (Lista de Conversas) -->
        <div class="sidebar">
            <div class="header">
                <div class="header-left-side">
                    <!-- Botão estilizado para modal de identidade -->
                    <div class="profile-config-btn" id="userSelfAvatar" title="Configurar Identidade">
                        <i class="fa-solid fa-user-gear"></i>
                    </div>
                    <span class="header-title" id="myDisplayName">usuario@email.com</span>
                </div>
                <div class="header-icons">
                    <i class="fa-solid fa-circle-notch"></i>
                    <i class="fa-solid fa-message"></i>
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
            </div>

            <div class="search-container">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass" style="color: var(--text-muted); font-size: 14px;"></i>
                    <input type="text" id="searchInput" placeholder="Pesquisar e-mails...">
                </div>
            </div>

            <!-- Lista de contatos exibindo apenas E-mails -->
            <div class="chat-list" id="chatList">
                <div class="chat-item" data-id="1">
                    <div class="chat-info">
                        <div class="chat-info-top">
                            <h4>clara.mendes@empresa.com</h4>
                            <span class="chat-time">14:32</span>
                        </div>
                        <div class="chat-msg-preview">Vamos fechar os detalhes do design amanhã?</div>
                    </div>
                </div>
                <div class="chat-item" data-id="2">
                    <div class="chat-info">
                        <div class="chat-info-top">
                            <h4>rodrigo.silva@empres
