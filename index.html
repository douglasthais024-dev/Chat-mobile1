<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta tags para funcionamento como App no Celular -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Chat Premium Real-Time Completo</title>
    <style>
        :root {
            --bg-gradient-1: linear-gradient(135deg, #121214 0%, #1a1a1e 100%);
            --bg-gradient-2: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --bg-gradient-3: linear-gradient(135deg, #141e30 0%, #243b55 100%);
            --bg-gradient-4: linear-gradient(135deg, #000000 0%, #434343 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b0b0d;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: var(--bg-gradient-1);
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: background 0.5s ease;
            position: relative;
        }

        /* Tela de AutenticaГ§ГЈo (Login/Cadastro) */
        .auth-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121214;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .auth-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .auth-box h2 {
            color: #fff;
            font-size: 20px;
            text-align: center;
            margin-bottom: 8px;
        }

        .auth-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 16px;
            border-radius: 12px;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        .auth-btn {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-btn:hover { opacity: 0.9; }

        .auth-toggle-text {
            color: #b0b0b5;
            font-size: 13px;
            text-align: center;
            cursor: pointer;
            margin-top: 8px;
            text-decoration: underline;
        }

        /* CabeГ§alho do Perfil */
        .chat-header {
            padding: 16px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-img-wrapper {
            position: relative;
            cursor: pointer;
        }

        .profile-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #007bff;
        }

        #file-avatar { display: none; }

        .profile-detail h4 {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #ff4d4d;
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
            display: block;
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .notif-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            color: #ffc107;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
        }

        /* Seletor de Papel de Parede */
        .wallpaper-select {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: none;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }
        .wallpaper-select option { background: #1a1a1e; }

        /* Feed de Mensagens */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* BalГөes ClГЎssicos */
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            color: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Lado Esquerdo - Azul */
        .message.left {
            background-color: #007bff;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Lado Direito - Preto */
        .message.right {
            background-color: #000000;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .msg-time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            align-self: flex-end;
            margin-top: 4px;
            display: block;
        }

        /* BotГЈo Oculto de Apagar */
        .delete-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .message:hover .delete-btn { display: flex; }

        .message img, .message video {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 5px;
            display: block;
        }

        .message .file-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00ff88;
            text-decoration: none;
            font-weight: 600;
            margin-top: 4px;
        }

        .file-caption {
            margin-top: 6px;
            font-size: 13.5px;
            color: #eeeeee;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 4px;
        }

        .encrypted-badge {
            display: block;
            font-size: 11px;
            color: #ffc107;
            margin-bottom: 4px;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Input de Texto inferior */
        .chat-input-area {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tools-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            padding-left: 4px;
        }

        .tool-btn {
            background: none;
            border: none;
            color: #b0b0b5;
            font-size: 18px;
            cursor: pointer;
        }

        .encrypt-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #b0b0b5;
            font-size: 12px;
            cursor: pointer;
            margin-left: auto;
        }

        .input-row { display: flex; gap: 8px; align-items: center; }

        #msg-input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 16px;
            border-radius: 16px;
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        #send-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 18px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Painel de Emojis Expandido */
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            background: #1a1a1e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            grid-template-columns: repeat(8, 1fr);
            gap: 8px;
            z-index: 20;
            max-height: 220px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .emoji-picker::-webkit-scrollbar { width: 5px; }
        .emoji-picker::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .emoji-picker span { font-size: 20px; cursor: pointer; text-align: center; padding: 4px; border-radius: 6px; }
        .emoji-picker span:hover { background: rgba(255,255,255,0.1); }

        /* Modal de EdiГ§ГЈo de Arquivo PrГ©-envio */
        .file-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 12, 0.95);
            z-index: 40;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .file-modal-box {
            background: #1a1a1e;
            width: 100%;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .file-modal-box h3 { color: white; font-size: 16px; }
        .preview-container {
            width: 100%; max-height: 180px; overflow: hidden; border-radius: 10px;
            display: flex; justify-content: center; align-items: center; background: #000;
        }
        .preview-container img, .preview-container video { max-width: 100%; max-height: 180px; object-fit: contain; }
        .file-placeholder-icon { font-size: 50px; color: #b0b0b5; padding: 20px; text-align: center; }
        #file-caption-input {
            width: 100%; background: #25252b; border: 1px solid #3a3a42;
            padding: 12px; color: white; border-radius: 10px; outline: none;
        }
    </style>
</head>
<body>

    <div class="chat-container" id="chat-box">
        
        <!-- ABA DE CADASTRO E LOGIN -->
        <div class="auth-overlay" id="auth-overlay">
            <div class="auth-box">
                <h2 id="auth-title">Acessar o Chat</h2>
                <input type="email" id="auth-email" class="auth-input" placeholder="Seu e-mail">
                <input type="password" id="auth-password" class="auth-input" placeholder="Sua senha (mГӯn. 6 dГӯgitos)">
                <button id="auth-primary-btn" class="auth-btn">Entrar</button>
                <p id="auth-toggle-link" class="auth-toggle-text">NГЈo tem uma conta? Cadastre-se</p>
            </div>
        </div>

        <!-- Topo / Perfil -->
        <div class="chat-header">
            <div class="profile-info">
                <div class="profile-img-wrapper" id="avatar-click-zone">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&auto=format&fit=crop" alt="Avatar" class="profile-img" id="avatar-preview">
                    <input type="file" id="file-avatar" accept="image/*">
                </div>
                <div class="profile-detail">
                    <h4 id="profile-name">Carregando...</h4>

                </div>
            </div>
            
            <div class="header-actions">
                <button class="notif-btn" id="enable-notif-btn" title="Ativar NotificaГ§Гөes no Celular">рҹ””</button>
                <select class="wallpaper-select" id="wallpaper-selector">
                    <option value="1">Noir Elegance</option>
                    <option value="2">Deep Ocean</option>
                    <option value="3">Midnight Blue</option>
                    <option value="4">Dark Carbon</option>
                </select>
            </div>
        </div>

        <!-- ГҒrea de Mensagens -->
        <div class="chat-messages" id="chat-messages"></div>

        <!-- Seletor de Emojis -->
        <div class="emoji-picker" id="emoji-picker"></div>

        <!-- Modal de EdiГ§ГЈo de Arquivo -->
        <div class="file-modal" id="file-modal">
            <div class="file-modal-box">
                <h3 id="upload-status-title">Enviar Arquivo / Foto</h3>
                <div class="preview-container" id="file-preview-zone"></div>
                <input type="text" id="file-caption-input" placeholder="Escreva uma legenda ou alteraГ§ГЈo no arquivo...">
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button id="cancel-file-btn" style="background: none; border: none; color: #ff4d4d; cursor: pointer; font-weight: 600; padding: 10px;">Cancelar</button>
                    <button id="confirm-file-btn" style="background: #fff; border: none; color: #000; padding: 10px 20px; border-radius: 10px; font-weight: 600; cursor: pointer;">Enviar</button>
                </div>
            </div>
        </div>

        <!-- Inputs e Ferramentas -->
        <div class="chat-input-area">
            <div class="tools-bar">
                <button class="tool-btn" id="emoji-toggle-btn" title="Emojis">рҹҳҖ</button>
                <button class="tool-btn" id="attach-btn" title="Enviar Foto ou Arquivo">рҹ“Һ</button>
                <input type="file" id="file-input" accept="image/*,video/*,application/*" style="display: none;">

                <label class="encrypt-toggle">
                    <input type="checkbox" id="encrypt-check"> рҹ”‘ Criptografar ConteГәdo
                </label>
            </div>

            <div class="input-row">
                <input type="text" id="msg-input" placeholder="Digite uma mensagem..." onkeypress="checkEnter(event)">
                <button id="send-btn">Enviar</button>
            </div>
        </div>
    </div>

    <!-- IntegraГ§ГЈo do Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQ3ebWx62hta35KRdihRbtwJoxrlUtxiM",
            authDomain: "chat-e797a.firebaseapp.com",
            projectId: "chat-e797a",
            storageBucket: "chat-e797a.firebasestorage.app",
            messagingSenderId: "104946241159",
            appId: "1:104946241159:web:93acbec71b40ec46c87222"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let usuarioAtual = null;
        let isScreenLoginMode = true;
        let carregamentoInicial = true;
        let audioCtxInstance = null;
        let swRegistration = null;

        // ---------------- SERVICE WORKER PARA NOTIFICAГҮГғO NO VISOR DO CELULAR ----------------
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', function(e) { self.skipWaiting(); });
                self.addEventListener('activate', function(e) { e.waitUntil(self.clients.claim()); });
                self.addEventListener('notificationclick', function(e) {
                    e.notification.close();
                    e.waitUntil(
                        clients.matchAll({ type: 'window', includeUncontrolled: true }).then(function(clientList) {
                            if (clientList.length > 0) return clientList[0].focus();
                            return clients.openWindow('/');
                        })
                    );
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).then(reg => {
                swRegistration = reg;
            }).catch(err => console.log("Service Worker registrado para background."));
        }

        // Elementos DOM
        const authOverlay = document.getElementById('auth-overlay');
        const authTitle = document.getElementById('auth-title');
        const authEmail = document.getElementById('auth-email');
        const authPassword = document.getElementById('auth-password');
        const authPrimaryBtn = document.getElementById('auth-primary-btn');
        const authToggleLink = document.getElementById('auth-toggle-link');
        
        const chatMessages = document.getElementById('chat-messages');
        const msgInput = document.getElementById('msg-input');
        const encryptCheck = document.getElementById('encrypt-check');
        const emojiPicker = document.getElementById('emoji-picker');
        const fileInput = document.getElementById('file-input');
        const fileModal = document.getElementById('file-modal');
        const filePreviewZone = document.getElementById('file-preview-zone');
        const fileCaptionInput = document.getElementById('file-caption-input');
        const enableNotifBtn = document.getElementById('enable-notif-btn');

        let rawSelectedFile = null;
        let unsubscribeSnapshot = null;

        // Ativar ГЎudio na primeira interaГ§ГЈo do usuГЎrio
        window.addEventListener('click', () => {
            if (!audioCtxInstance) {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (AudioCtx) audioCtxInstance = new AudioCtx();
            }
            if (audioCtxInstance && audioCtxInstance.state === 'suspended') {
                audioCtxInstance.resume();
            }
        }, { once: false });

        // ---------------- CRIPTOGRAFIA COM SENHA CUSTOMIZADA ----------------
        function criptografarTextoComSenha(texto, senha) {
            let resultado = '';
            for (let i = 0; i < texto.length; i++) {
                resultado += String.fromCharCode(texto.charCodeAt(i) ^ senha.charCodeAt(i % senha.length));
            }
            return JSON.stringify({
                data: btoa(unescape(encodeURIComponent(resultado))),
                passHash: btoa(senha)
            });
        }

        function decriptografarTextoComSenha(payloadStr, senhaDigitada) {
            try {
                const obj = JSON.parse(payloadStr);
                if (obj.passHash !== btoa(senhaDigitada)) {
                    return null;
                }
                const raw = decodeURIComponent(escape(atob(obj.data)));
                let resultado = '';
                for (let i = 0; i < raw.length; i++) {
                    resultado += String.fromCharCode(raw.charCodeAt(i) ^ senhaDigitada.charCodeAt(i % senhaDigitada.length));
                }
                return resultado;
            } catch (e) {
                return null;
            }
        }

        // ---------------- FORMATADOR DE HORГҒRIO ----------------
        function obterHoraFormatada(createdAt) {
            if (!createdAt) {
                return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            const data = createdAt.toDate ? createdAt.toDate() : new Date(createdAt);
            return data.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // ---------------- NOTIFICAГҮГ•ES DO SISTEMA (VISOR DO CELULAR) ----------------
        function pedirPermissaoNotificacao() {
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        enableNotifBtn.style.color = "#00ff88";
                    } else if (permission === "denied") {
                        enableNotifBtn.style.color = "#ff4d4d";
                    }
                });
            } else {
                alert("Seu navegador nГЈo suporta notificaГ§Гөes de sistema.");
            }
        }

        enableNotifBtn.onclick = () => {
            pedirPermissaoNotificacao();
            alert("NotificaГ§Гөes ativadas! VocГӘ receberГЎ alertas no visor quando uma nova mensagem chegar.");
        };

        function tocarSomNotificacao(tipo = 'recebida') {
            try {
                if (!audioCtxInstance) {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (AudioCtx) audioCtxInstance = new AudioCtx();
                }
                if (!audioCtxInstance) return;

                const osc = audioCtxInstance.createOscillator();
                const gain = audioCtxInstance.createGain();

                osc.connect(gain);
                gain.connect(audioCtxInstance.destination);

                if (tipo === 'enviada') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, audioCtxInstance.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(880, audioCtxInstance.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.15, audioCtxInstance.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtxInstance.currentTime + 0.08);
                    osc.start();
                    osc.stop(audioCtxInstance.currentTime + 0.08);
                } else {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(587.33, audioCtxInstance.currentTime);
                    osc.frequency.setValueAtTime(880, audioCtxInstance.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, audioCtxInstance.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtxInstance.currentTime + 0.25);
                    osc.start();
                    osc.stop(audioCtxInstance.currentTime + 0.25);
                }
            } catch (e) {
                console.log("Aguardando toque para emitir ГЎudio.");
            }
        }

        // Emitir NotificaГ§ГЈo no Visor/Barra de NotificaГ§Гөes do Celular
        function emitirNotificacaoRecebida(titulo, corpo) {
            tocarSomNotificacao('recebida');

            if ("Notification" in window && Notification.permission === "granted") {
                const opcoesNotificacao = {
                    body: corpo,
                    icon: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&auto=format&fit=crop',
                    badge: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&auto=format&fit=crop',
                    vibrate: [300, 100, 300], // VibraГ§ГЈo do celular
                    tag: 'chat-mensagem-nova',
                    renotify: true,
                    requireInteraction: true // MantГ©m no visor atГ© o usuГЎrio clicar
                };

                if (swRegistration && swRegistration.showNotification) {
                    swRegistration.showNotification(titulo, opcoesNotificacao);
                } else {
                    new Notification(titulo, opcoesNotificacao);
                }
            }
        }

        // ---------------- AUTHENTICATION ----------------
        authToggleLink.onclick = () => {
            isScreenLoginMode = !isScreenLoginMode;
            if (isScreenLoginMode) {
                authTitle.innerText = "Acessar o Chat";
                authPrimaryBtn.innerText = "Entrar";
                authToggleLink.innerText = "NГЈo tem uma conta? Cadastre-se";
            } else {
                authTitle.innerText = "Criar Nova Conta";

        function converterParaBase64(file, callback) {
            const reader = new FileReader();
            reader.onload = (e) => callback(e.target.result);
            reader.readAsDataURL(file);
        }

        function comprimirFotoSeNecessario(file, callback) {
            if (!file.type.startsWith('image/') || file.size < 1200000) {
                callback(file);
                return;
            }
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                const max = 1200;
                if (width > height && width > max) { height *= max / width; width = max; }
                else if (height > max) { width *= max / height; height = max; }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                canvas.toBlob((blob) => {
                    callback(new File([blob], file.name || 'foto.jpg', { type: 'image/jpeg' }));
                }, 'image/jpeg', 0.8);
            };
            img.onerror = () => callback(file);
        }

        function processarEEnviarArquivo(arquivo, callbackSucesso) {
            comprimirFotoSeNecessario(arquivo, (fotoPronta) => {
                const nomeArquivo = fotoPronta.name || `foto_${Date.now()}.jpg`;
                const storageRef = ref(storage, 'arquivos/' + Date.now() + '_' + nomeArquivo);
                const uploadTask = uploadBytesResumable(storageRef, fotoPronta);

                let finalizou = false;

                const timeoutFallback = setTimeout(() => {
                    if (!finalizou) {
                        finalizou = true;
                        try { uploadTask.cancel(); } catch(e){}
                        document.getElementById('upload-status-title').innerText = "Enviando imagem rГЎpida...";
                        converterParaBase64(fotoPronta, (dataUrl) => {
                            callbackSucesso(dataUrl, fotoPronta.type, nomeArquivo);
                        });
                    }
                }, 6000);

                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progresso = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
                        document.getElementById('upload-status-title').innerText = `Enviando... ${progresso}%`;
                    }, 
                    (error) => {
                        if (!finalizou) {
                            finalizou = true;
                            clearTimeout(timeoutFallback);
                            converterParaBase64(fotoPronta, (dataUrl) => {
                                callbackSucesso(dataUrl, fotoPronta.type, nomeArquivo);
                            });
                        }
                    }, 
                    () => {
                        if (!finalizou) {
                            finalizou = true;
                            clearTimeout(timeoutFallback);
                            getDownloadURL(uploadTask.snapshot.ref).then((downloadURL) => {
                                callbackSucesso(downloadURL, fotoPronta.type, nomeArquivo);
                            }).catch(() => {
                                converterParaBase64(fotoPronta, (dataUrl) => {
                                    callbackSucesso(dataUrl, fotoPronta.type, nomeArquivo);
                                });
                            });
                        }
                    }
                );
            });
        }

                                    const badge = msgDiv.querySelector('.encrypted-badge');
                                    badge.innerText = "рҹ”“ ConteГәdo Desbloqueado";
                                    badge.style.color = "#00ff88";
                                    msgDiv.onclick = null;
                                } else {
                                    alert("Senha incorreta!");
                                }
                            }
                        };
                    } else {
                        renderizarConteudoEstruturado(dados.texto, containerConteudo);
                    }

                    msgDiv.appendChild(containerConteudo);

                    const horaSpan = document.createElement('span');
                    horaSpan.className = 'msg-time';
                    horaSpan.innerText = obterHoraFormatada(dados.createdAt);
                    msgDiv.appendChild(horaSpan);

                    chatMessages.appendChild(msgDiv);
                });

                chatMessages.scrollTop = chatMessages.scrollHeight;
                carregamentoInicial = false;
            }, (error) => {
                console.error("Erro no Listener: ", error);
            });
        }
    </script>
</body>
</html>
