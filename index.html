<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Premium - Electric Edition</title>
    <style>
        :root {
            --msg-blue: #007AFF;
            --msg-private: #5856D6;
            --text-main: #1C1C1E;
        }

        body {
            margin: 0;
            padding: 0;
            /* Fundo com efeito de raios sutil */
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .chat-app {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            position: relative;
        }

        .header {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.9);
            text-align: center;
            font-weight: 700;
            border-bottom: 1px solid #ddd;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 16px;
            max-width: 85%;
            word-wrap: break-word;
        }

        .received { background: #e5e5ea; align-self: flex-start; border-bottom-left-radius: 4px; }
        .sent { background: var(--msg-blue); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        /* Balão Particular */
        .sent.private { 
            background: var(--msg-private); 
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(88, 86, 214, 0.5);
        }

        .emoji-panel {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 10px;
            right: 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 15px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            z-index: 100;
        }

        .input-area {
            padding: 15px;
            background: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #ddd;
        }

        .icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--msg-blue); }
        .icon-btn.active { color: var(--msg-private); font-weight: bold; }

        input[type="text"] { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        .send-btn { background: var(--msg-blue); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-app">
    <div class="header">Chat Premium ⚡</div>
    
    <div class="messages" id="box">
        <div class="msg received">Chat Seguro Ativo! 🔒</div>
    </div>

    <div class="emoji-panel" id="emojiPanel" style="display:none;"></div>
    
    <div class="input-area">
        <input type="file" id="fileInput" style="display: none;" onchange="handleFile(event)">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <button class="icon-btn" onclick="toggleEmoji()">😊</button>
        <!-- Botão Privado -->
        <button class="icon-btn" id="privBtn" onclick="togglePrivate()">🔒</button>
        
        <input type="text" id="input" placeholder="Mensagem...">
        <button class="send-btn" onclick="send()">Enviar</button>
    </div>
</div>

<script>
    const box = document.getElementById('box');
    const inp = document.getElementById('input');
    const privBtn = document.getElementById('privBtn');
    let isPrivate = false;

    // Configuração do modo privado
    function togglePrivate() {
        isPrivate = !isPrivate;
        privBtn.classList.toggle('active');
        inp.placeholder = isPrivate ? "Mensagem particular..." : "Mensagem...";
    }

    // Gerador de Emojis
    const emojis = ['😀', '😂', '😍', '😎', '😢', '😡', '👍', '🙏', '🔥', '✨', '❤️', '🎉', '🤔', '🙌', '🚀', '🌈', '🍕', '🐱', '🐶', '⚽', '💡', '🎵', '🎈', '✅'];
    const emojiPanel = document.getElementById('emojiPanel');
    emojis.forEach(e => {
        const btn = document.createElement('button');
        btn.innerText = e;
        btn.onclick = () => inp.value += e;
        emojiPanel.appendChild(btn);
    });

    function toggleEmoji() { emojiPanel.style.display = emojiPanel.style.display === 'grid' ? 'none' : 'grid'; }

    function send() {
        if(!inp.value.trim()) return;
        const className = isPrivate ? 'sent private' : 'sent';
        addMessage(inp.value, className);
        inp.value = '';
    }

    function addMessage(content, className, isHtml = false) {
        const div = document.createElement('div');
        div.className = `msg ${className}`;
        isHtml ? div.innerHTML = content : div.innerText = content;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const html = file.type.startsWith('image/') ? `<img src="${e.target.result}" style="max-width:100%; border-radius:10px;">` : `📎 ${file.name}`;
            addMessage(html, 'sent', true);
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
